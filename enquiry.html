<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Haven Beauty Studio | Enquiries</title>
    <!-- SEO information for search engines -->
    <meta name="description" content="Send an enquiry to Gloe Haven Beauty Studio about services, prices and availability.">
    <meta name="keywords" content="beauty salon, enquiries, nails, hair, makeup, skincare, Johannesburg">
    <meta name="author" content="Karabo Mojalefa">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
      <!-- Header section contains the logo and navigation menu for easy access to all pages -->
       <header>
        <img src="images/Logo.png" alt="Glow Haven Beauty Studio Logo" class="logo">
         <!-- Navigation menu allows users to move between different pages of the website -->
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="services.html">Services</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact Us</a>
            <a href="enquiry.html">Enquiry</a>
            <a href="booking.html">Booking</a>
        </nav>
       </header>
       <!-- Main section contains the primary content including the hero image, introduction, and call-to-action -->
        <main class="enquiry-section">
            <!-- Small introduction for users -->
             <h1>Service enquiry</h1>
             <p>
                Complete the form below if you would like more information about our services, pricing or availability.
             </p>
             <!-- Enquiry form for customer questions -->
              <form class="enquiry-form">
                <label for="enquiryName">Full Name</label>
                <input type="text" id="enquiryName" required><br><br>
                <label for="enquiryEmail">Email Address</label>
                <input type="email" id="enquiryEmail" required><br><br>
                <label for="enquiryPhone">Phone Number</label>
                <input type="tel" id="enquiryPhone" pattern="[0-9]{10}" placeholder="0712345678" required><br><br>
                <!-- User choose service they want information about -->
                 <label for="enquiryService">Select Service</label>
                 <select id="enquiryService" required>
                    <option value="">
                        -- Select a Service --
                    </option>
                    <option>Hair Services</option>
                    <option>Nail Services</option>
                    <option>Makeup</option>
                    <option>Skincare</option>
                 </select>
                 <br><br>
                 <!-- Date customer would like the service -->
                  <label for="enquiryDate">Prefrred Date</label>
                  <input type="date" id="enquiryDate" required><br><br>
                  <!-- Customer writes their enquiry -->
                   <label for="enquiryMessage">Enquiry Details</label>
                   <textarea id="enquiryMessage" rows="5" placeholder="Enter your enquiry here..." required></textarea>
                   <br><br>
                   <button type="Submit">Submit Enquiry</button>
                   <button type="Reset">Clear Form</button>
                   <br><br>
                   <!--JavaScript response message appears here -->
                   <p id="enquiryResult"></p>
              </form>
        </main>
    <!-- Footer section provides copyright information and closes the webpage structure -->
    <footer>
        <p>
            Copyright &copy; 2026 - &amp; Developed by <b>Karabo Mojalefa</b>
        </p>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
