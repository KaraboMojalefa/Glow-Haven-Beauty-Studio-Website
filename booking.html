<!--Main section contains all the information a user needs to enter when scheduling an appointment-->
<main>
<!--Booking form allows users to request appointments online-->
        
        <h1>Book Your Appointment</h1>
        <P>Please fill in the form below to schedule your appointment 
            and we will respond shortly.
        </P>
        <form>
         
            Name:<input type="text" required placeholder="Enter your name">
        
           
            Email:<input type="email" required placeholder="example@gmail.com">
        
          
            Age:<input type="number" required placeholder="">
        
            Gender:
        <input type="radio" name="gender">Male 
        <input type="radio" name="gender">Female 
            <!--Type of service user wants to book-->
            Select Service: 
            <select>
                <option disabled selected value> --Select an option-- </option>
                <option>Hair Styling</option>
                <option>Nails</option>
                <option>Makeup</option>
                <option>Skincare</option>
            </select>
            <!-- Date selection--> 
             Preferred Date: <br>
             <input type="date">
        <!--Message-->
            Additional Notes: 
            <textarea rows="5"></textarea>
        <!--Buttons-->
        <button type="submit">Submit Booking</button>
        <button type="reset">Clear Form</button>
    </form>
</main>
